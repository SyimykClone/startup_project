name: around
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.9.0
  dio: ^5.7.0
  provider: ^6.1.2
  geolocator: ^12.0.0
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.1.0
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2


  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3


flutter:
  uses-material-design: true
  
  assets:
    - assets/.env
    - assets/app_icon.png

flutter_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
